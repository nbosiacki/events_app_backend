# nginx production config for events.nicholasbosiacki.com
#
# Architecture:
#   - /api/*  → reverse-proxied to the FastAPI backend container on port 8000
#   - /*      → served from pre-built static files in /opt/events_frontend/dist/
#
# The frontend is a React SPA compiled locally and deployed via rsync.
# There is no Node.js runtime or frontend container on this server.
# nginx serves the static files directly from disk, which is more efficient
# than running a container just to serve static assets.

# HTTP → HTTPS redirect
# All plain HTTP traffic is immediately redirected to HTTPS.
# The 301 is a permanent redirect, which browsers will cache.
server {
    listen 80;
    server_name events.nicholasbosiacki.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name events.nicholasbosiacki.com;

    # SSL certificate paths are managed by Certbot.
    # These files are created when you run: sudo certbot --nginx -d events.nicholasbosiacki.com
    # Certbot also sets up auto-renewal via a systemd timer, so these certs never expire
    # as long as the VM is running.
    ssl_certificate /etc/letsencrypt/live/events.nicholasbosiacki.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/events.nicholasbosiacki.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API — reverse proxy to FastAPI backend container
    # The backend binds to 127.0.0.1:8000 inside the VM (not exposed to the internet
    # directly). nginx is the only public entry point. All /api/ traffic is forwarded
    # to the container with the original headers preserved so the backend can log real
    # client IPs and enforce HTTPS-only CORS.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend SPA — serve pre-built static files from disk
    # try_files checks for an exact file match, then a directory match, then falls
    # back to /index.html. This fallback is essential for client-side routing:
    # a request for /events/123 has no corresponding file on disk, so nginx
    # returns index.html and React Router takes over from there.
    location / {
        root /opt/events_frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
